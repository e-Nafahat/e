<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; 
            font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; 
        }
        
        /* خلفية الكون السينمائية */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #001220 0%, #000 100%);
        }

        #cinema-intro { 
            display: flex; opacity: 1; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: transparent; 
            align-items: center; justify-content: center; transition: opacity 1.5s ease-in-out; 
            z-index: 2;
        }

        /* محتوى المقدمة - تقليل المسافات */
        .intro-content { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; gap: 8px; z-index: 5; 
        }
        
        .elegant-logo-img { 
            width: 115px; 
            height: auto; 
            opacity: 0; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); 
            z-index: 10;
            transform: scale(0.85);
            margin-bottom: 5px;
        }
        
        .platform-title {
            color: #d4af37;
            font-weight: 900;
            font-size: 1.6rem;
            margin: 0;
            opacity: 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            line-height: 1.2;
        }

        .platform-title-en {
            color: #f0f0f0;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin: 0;
            opacity: 0;
            text-transform: uppercase;
        }

        .elegant-line { 
            height: 1px; 
            width: 40%; 
            background: linear-gradient(90deg, transparent, #d4af37, transparent); 
            opacity: 0; 
            margin: 8px 0; 
        }
        
        /* زر الدخول المحدث (أصغر وأكثر تناسقاً) */
        .mini-btn-solid {
            margin-top: 15px; 
            padding: 8px 35px; 
            font-size: 0.8rem; 
            font-family: 'Cairo', sans-serif;
            color: #000; 
            background: #d4af37; 
            border: none; 
            border-radius: 20px;
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: all 0.4s ease; 
            opacity: 0;
            z-index: 100; 
            font-weight: 700;
        }

        .mini-btn-solid:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
        }

        /* مقولة الإمام مالك (خط أصغر بدون أيقونة) */
        .imam-malik-quote {
            position: absolute;
            bottom: 30px;
            width: 90%;
            text-align: center;
            color: rgba(212, 175, 55, 0.7);
            font-size: 0.65rem;
            font-weight: 400;
            opacity: 0;
            animation: fadeIn 3s ease forwards 3.5s;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            padding-top: 15px;
        }

        /* Animations */
        .fade-in-up { animation: fadeInUp 1.8s ease forwards; }
        .fade-in { animation: fadeIn 2.5s ease forwards; }
        .scale-x { animation: scaleX 1.5s ease forwards; }
        
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.9); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleX { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: scaleX(1); } }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <audio id="logo-sound" preload="auto">
        <source src="https://e-nafahat.github.io/e/leader/lindo.mp3" type="audio/mpeg">
    </audio>

    <div id="cinema-intro">
        <div class="intro-content">
            <img src="https://e-nafahat.github.io/e/leader/LogoNafahat.png" class="elegant-logo-img fade-in-up" style="animation-delay: 0.5s;">
            
            <h1 class="platform-title fade-in" style="animation-delay: 1s;">نَفَحَاتٌ إِيمَانِيَّةٌ</h1>
            <p class="platform-title-en fade-in" style="animation-delay: 1.4s;">NAFAHAT IMANIYAH</p>

            <div class="elegant-line scale-x" style="animation-delay: 1.8s;"></div>
            
            <button id="start-btn" class="mini-btn-solid fade-in" style="animation-delay: 2.5s;">دُخُول</button>
        </div>

        <div class="imam-malik-quote">
            <span>قَالَ الإِمَامُ مَالِكٌ رَحِمَهُ اللهُ: لَا يُصْلِحُ آخِرَ هَذِهِ الأُمَّةِ إِلَّا مَا أَصْلَحَ أَوَّلَهَا</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let meteors = [];

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            stars = [];
            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 1.2 + 0.2,
                    opacity: Math.random(),
                    blink: 0.003 + Math.random() * 0.007,
                    speed: 0.02 + Math.random() * 0.04
                });
            }
        }

        function createMeteor() {
            meteors.push({
                x: Math.random() * window.innerWidth * 1.5,
                y: Math.random() * window.innerHeight * -0.5,
                len: 120 + Math.random() * 150,
                speed: 3 + Math.random() * 5,
                opacity: 1,
                thickness: 1 + Math.random() * 1
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            const grad = ctx.createRadialGradient(window.innerWidth/2, window.innerHeight/2, 0, window.innerWidth/2, window.innerHeight/2, window.innerWidth);
            grad.addColorStop(0, '#001a2c');
            grad.addColorStop(1, '#000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            stars.forEach(s => {
                s.opacity += s.blink;
                if(s.opacity > 1 || s.opacity < 0.3) s.blink *= -1;
                s.x += s.speed;
                if(s.x > window.innerWidth) s.x = 0;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            meteors.forEach((m, index) => {
                ctx.save();
                ctx.globalAlpha = m.opacity;
                const meteorGrad = ctx.createLinearGradient(m.x, m.y, m.x - m.len, m.y + m.len);
                meteorGrad.addColorStop(0, '#fff'); 
                meteorGrad.addColorStop(0.2, '#d4af37'); 
                meteorGrad.addColorStop(1, 'transparent'); 
                ctx.strokeStyle = meteorGrad;
                ctx.lineWidth = m.thickness;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.len, m.y + m.len);
                ctx.stroke();
                m.x -= m.speed; m.y += m.speed; m.opacity -= 0.005;
                if(m.opacity <= 0) meteors.splice(index, 1);
                ctx.restore();
            });

            if(Math.random() < 0.01) createMeteor();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        draw();

        (function() {
            const startBtn = document.getElementById('start-btn');
            const logoAudio = document.getElementById('logo-sound');

            startBtn.addEventListener('click', function() {
                window.parent.postMessage('PLAY_INTRO_AUDIO', '*');
                if(logoAudio) {
                    logoAudio.play().catch(e => console.log("Audio blocked"));
                }
                document.getElementById('cinema-intro').style.opacity = '0';
                setTimeout(() => {
                    window.parent.postMessage('START_SITE_NOW', '*');
                    document.getElementById('cinema-intro').style.display = 'none';
                }, 1200);
            });
        })();
    </script>
</body>
</html>
