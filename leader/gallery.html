<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض نَفحات الرقمي | Nafahat Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), #1a252f);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        header p {
            margin: 8px 0 0;
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Back Button */
        .back-nav {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-back:focus { outline: none; }
        .btn-back:hover { background: var(--accent-color); transform: scale(1.1); }

        /* Filter Tabs - النظام الجديد لسهولة التصفح */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            padding: 0 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 25px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            color: var(--primary-color);
            font-weight: 500;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(44, 62, 80, 0.2);
        }

        /* Gallery Container */
        .container {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 15px;
        }

        .gallery-grid {
            column-count: 3;
            column-gap: 15px;
            transition: opacity 0.3s ease-in-out;
        }

        @media (max-width: 992px) { .gallery-grid { column-count: 2; } }
        @media (max-width: 600px) { .gallery-grid { column-count: 1; } }

        /* Card Style */
        .poster-card {
            background: white;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: relative;
            display: block; /* للتحكم في الإخفاء والإظهار */
        }

        .poster-card img {
            width: 100%;
            height: auto;
            display: block;
            loading: lazy;
        }

        .card-overlay {
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            padding: 5px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:hover { color: var(--accent-color); transform: translateY(-2px); }
        .download-btn { color: #2ecc71; }
        .share-btn { color: #3498db; }

        footer {
            text-align: center;
            padding: 30px;
            opacity: 0.5;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-nav">
            <button class="btn-back" onclick="goBackHome()" title="العودة">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <h1>مَعرض نَفحات</h1>
        <p>نفحات إيمانية | المنهج الصافي والذكر الحكيم</p>
    </header>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterGallery('all')">الكل</button>
        <button class="tab-btn" onclick="filterGallery('tafakkur')">سِلْسِلَةُ تَفَكَّــــرْ</button>
        <button class="tab-btn" onclick="filterGallery('general')">تصاميم دَعوية</button>
    </div>

    <div class="container">
        <div class="gallery-grid" id="galleryGrid">
            </div>
    </div>

    <footer>
        نَفحات إيمانية &copy; 2026 | مَعرض التصاميم الرقمية
    </footer>

    <script>
        // تعريف مصفوفات الصور مع تصنيفها
        const tafakkurImages = [
            "https://i.postimg.cc/htdtfGvv/20260312-081449.png",
            "https://i.postimg.cc/mDDx1djS/20260311-202731.png",
            "https://i.postimg.cc/5tfWb9FD/20260311-093805.png",
            "https://i.postimg.cc/9Xk2ZjvJ/20260310-073538.png",
            "https://i.postimg.cc/wM1dZWsM/20260310-064422.png",
            "https://i.postimg.cc/DyW2Mzr3/20260309-121748.png"
        ];

        const generalImages = [
            "https://i.postimg.cc/5N65bFR3/20260309-062543.png",
            "https://i.postimg.cc/mZ5CcZzc/20260308-065231.png",
            "https://i.postimg.cc/d1QrCLjW/20260307-193821.png",
            "https://i.postimg.cc/MKqMGQXp/20260307-070024.png",
            "https://i.postimg.cc/bv7dfGKq/20260306-082625.png",
            "https://i.postimg.cc/cHG15pn1/20260306-074849.png",
            "https://i.postimg.cc/VLkfTBdX/20260305-080455.png",
            "https://i.postimg.cc/C140rz04/20260304-073722.png",
            "https://i.postimg.cc/LsKMHz6N/20260303-100039.png",
            "https://i.postimg.cc/bNW7TQbP/naf1.png",
            "https://i.postimg.cc/NMsSMbhd/20260227-092725.jpg",
            "https://i.postimg.cc/cCjbFSKW/20260226-090011.jpg",
            "https://i.postimg.cc/mrR6XVrB/20260225-093830.jpg",
            "https://i.postimg.cc/VsTZQz61/20260224-211231.jpg",
            "https://i.postimg.cc/qRqwSFHT/20260224-090500.jpg"
        ];

        const grid = document.getElementById('galleryGrid');

        // وظيفة بناء المعرض بالكامل
        function initGallery() {
            grid.innerHTML = '';
            // إضافة صور تفكر أولاً
            tafakkurImages.forEach((url, i) => createCard(url, 'tafakkur', `Tafakkur-${i+1}`));
            // ثم الصور العامة
            generalImages.forEach((url, i) => createCard(url, 'general', `Nafahat-${i+1}`));
        }

        function createCard(url, category, filename) {
            const card = document.createElement('div');
            card.className = `poster-card ${category}`;
            card.innerHTML = `
                <img src="${url}" alt="Nafahat Poster">
                <div class="card-overlay">
                    <button class="action-btn download-btn" title="تحميل مباشر" onclick="downloadDirectly('${url}', '${filename}')">
                        <i class="fas fa-cloud-download-alt"></i>
                    </button>
                    <button class="action-btn share-btn" title="مشاركة" onclick="shareImg()">
                        <i class="fas fa-share-nodes"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        // وظيفة الفلترة السحرية
        function filterGallery(category) {
            // تحديث الأزرار
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const cards = document.querySelectorAll('.poster-card');
            
            grid.style.opacity = '0';
            
            setTimeout(() => {
                cards.forEach(card => {
                    if (category === 'all' || card.classList.contains(category)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
                grid.style.opacity = '1';
            }, 300);
        }

        // تشغيل المعرض عند التحميل
        initGallery();

        async function downloadDirectly(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename + ".png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                window.open(url, '_blank');
            }
        }

        function goBackHome() {
            window.parent.postMessage('CLOSE_IFRAME', '*');
            window.history.back();
            window.top.location.href = '../index.html';
        }

        async function shareImg() {
            const galleryFullUrl = "https://e-nafahat.github.io/e/leader/gallery.html";
            const shareText = `شاهد هذا التصميم من نفحات إيمانية | المنهج الصافي والذكر الحكيم ✨\n\nللمزيد من التصاميم والروائع زوروا مَعرضنا الرقمي:\n${galleryFullUrl}`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'مَعرض نَفحات',
                        text: shareText
                    });
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
                window.open(whatsappUrl, '_blank');
            }
        }
    </script>
</body>
</html>
