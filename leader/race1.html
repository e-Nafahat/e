<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة نفحات الرمضانية 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2d5a27;
            --gold-color: #d4af37;
            --bg-color: #0b2416;
            --whatsapp-color: #25D366;
            --facebook-color: #1877F2;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.98);
            color: #333;
            width: 90%; max-width: 450px;
            border-radius: 25px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 2px solid var(--gold-color);
            position: relative; text-align: center;
        }

        .header-img { width: 100px; margin-bottom: 15px; }

        .timer-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 5px solid var(--primary-color);
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 20px; font-size: 28px; font-weight: bold;
            color: var(--primary-color); background: #fff;
            box-shadow: 0 0 15px rgba(45, 90, 39, 0.2);
        }

        h1 { font-family: 'Amiri', serif; color: var(--primary-color); font-size: 2.2rem; margin: 10px 0; }

        .question-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; color: #444; line-height: 1.6; }

        .options-grid { display: grid; gap: 15px; }

        .option-btn {
            background: #f9f9f9; border: 2px solid #eee;
            padding: 15px; border-radius: 15px;
            cursor: pointer; font-size: 1.1rem; font-family: 'Tajawal', sans-serif;
            transition: 0.3s all ease; font-weight: 700; color: #444;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--primary-color); color: white; border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .share-container {
            margin-top: 25px; display: none; flex-direction: column; gap: 10px;
        }

        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; border: none;
            color: white; font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: 0.3s; width: 100%;
        }

        .whatsapp { background-color: var(--whatsapp-color); }
        .facebook { background-color: var(--facebook-color); }
        .social-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .back-btn {
            margin-top: 20px; background: none; border: 1px solid #ccc;
            color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        .lantern { position: absolute; font-size: 25px; top: -15px; animation: swing 3s infinite ease-in-out; }
        .left-l { left: 20px; } .right-l { right: 20px; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        
        .encourage-text { color: var(--gold-color); font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <div class="lantern left-l">🏮</div>
        <div class="lantern right-l">🏮</div>

        <img src="LogoNafahat.png" alt="Logo" class="header-img">
        <h1>مسابقة نفحات الرمضانية</h1>
        
        <div id="setup-view">
            <div class="encourage-text">تحدي اليوم: هل أنت مستعد؟ ✨</div>
            <p style="font-size: 1.1rem; line-height: 1.8; color: #555;">
                مرحباً بك في مسابقة "نفحات" اليومية.<br>
                أمامك <strong>30 ثانية</strong> فقط للإجابة..<br>
                لديك محاولة واحدة، فاستعن بالله وركز!
            </p>
            <button class="option-btn" style="background: var(--primary-color); color: white; width: 100%; border: none;" onclick="startQuiz()">ابدأ التحدي الآن ⚡</button>
        </div>

        <div id="quiz-view" style="display: none;">
            <div class="timer-circle" id="timer">30</div>
            <p class="question-text" id="question-text"></p>
            <div class="options-grid" id="options-grid"></div>
        </div>

        <div id="result-view" style="display: none;">
            <h2 id="result-title" style="font-size: 1.8rem;"></h2>
            <p id="result-msg" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
            
            <div id="share-section" class="share-container">
                <p style="font-size: 0.9rem; color: #666;">شارك التحدي مع أحبابك (دون كشف الإجابة 😉)</p>
                <button class="social-btn whatsapp" onclick="shareResult('whatsapp')">
                    مشاركة عبر واتساب 💬
                </button>
                <button class="social-btn facebook" onclick="shareResult('facebook')">
                    نشر على فيسبوك 💙
                </button>
            </div>
        </div>

        <button class="back-btn" onclick="goBackHome()">⬅ عودة للموقع</button>
    </div>

    <script>
        // دالة العودة المتفق عليها لضمان الملاحة السليمة
        function goBackHome() {
            window.parent.postMessage('CLOSE_IFRAME', '*');
            window.history.back();
            window.top.location.href = '../index.html';
        }

        // قاعدة بيانات الأسئلة المحدثة (20 سؤالاً)
        const questionsDatabase = [
            { id: 1, q: "مَن هو الصحابي الذي اهتز لوفاته عرش الرحمن؟", options: ["سعد بن معاذ", "حمزة بن عبد المطلب", "جعفر الطيار"], correct: 0 },
            { id: 2, q: "ما هي السورة التي كانت سبباً في إسلام عمر بن الخطاب؟", options: ["سورة يس", "سورة النجم", "سورة طه"], correct: 2 },
            { id: 3, q: "مَن هو 'أمين هذه الأمة' كما لقبه النبي ﷺ؟", options: ["أبو بكر الصديق", "أبو عبيدة عامر بن الجراح", "خالد بن الوليد"], correct: 1 },
            { id: 4, q: "ما هي السورة التي تسمى 'المنجية' من عذاب القبر؟", options: ["سورة السجدة", "سورة الملك", "سورة الكهف"], correct: 1 },
            { id: 5, q: "مَن هو أول مَن جهر بالقرآن الكريم في مكة؟", options: ["عبد الله بن مسعود", "بلال بن رباح", "علي بن أبي طالب"], correct: 0 },
            { id: 6, q: "ما هي 'فسطاط القرآن' كما نُعتت في الآثار؟", options: ["سورة الفاتحة", "سورة البقرة", "سورة آل عمران"], correct: 1 },
            { id: 7, q: "صحابي أمر النبي ﷺ الأمة أن تأخذ القرآن عن أربعة، مَن أولهم؟", options: ["عبد الله بن مسعود", "معاذ بن جبل", "أبي بن كعب"], correct: 0 },
            { id: 8, q: "ما هي السورة التي تُعدل ثلث القرآن الكريم؟", options: ["سورة الفاتحة", "سورة الإخلاص", "سورة الكافرون"], correct: 1 },
            { id: 9, q: "مَن هو الصحابي الذي لُقب بـ 'باحث عن الحقيقة'؟", options: ["سلمان الفارسي", "أبو ذر الغفاري", "صهيب الرومي"], correct: 0 },
            { id: 10, q: "سورة في القرآن تُسمى 'سورة النعم'؟", options: ["سورة الرحمن", "سورة النحل", "سورة الضحى"], correct: 1 },
            { id: 11, q: "مَنِ الصَّحابِيُّ الَّذِي نَزَلَ جِبْرِيلُ -عَلَيْهِ السَّلَامُ- عَلَى صُورَتِهِ؟", options: ["دِحْيَةُ الكَلْبِيُّ", "مِصْعَبُ بْنُ عُمَيْرٍ", "زَيْدُ بْنُ حَارِثَةَ"], correct: 0 },
            { id: 12, q: "سُورَةٌ فِي القُرْآنِ تُسَمَّى 'الفَاضِحَةَ' لِأَنَّهَا كَشَفَتْ أَحْوَالَ المُنَافِقِينَ؟", options: ["سُورَةُ التَّوْبَةِ", "سُورَةُ الأَحْزَابِ", "سُورَةُ المُنَافِقُونَ"], correct: 0 },
            { id: 13, q: "مَنْ هُوَ 'ذُو الشِّهَادَتَيْنِ' الَّذِي جَعَلَ النَّبِيُّ ﷺ شَهَادَتَهُ بِشَهَادَةِ رَجُلَيْنِ؟", options: ["خُزَيْمَةُ بْنُ ثَابِتٍ", "أُبَيُّ بْنُ كَعْبٍ", "عَبْدُ اللهِ بْنُ عُمَرَ"], correct: 0 },
            { id: 14, q: "مَا هِيَ السُّورَةُ الَّتِي خُتِمَتْ بِوَصِيَّةٍ جَامِعَةٍ بِأَرْبَعَةِ أَسْبَابٍ لِلْفَلَاحِ؟", options: ["سُورَةُ آلِ عِمْرَانَ", "سُورَةُ المَائِدَةِ", "سُورَةُ الأَعْرَافِ"], correct: 0 },
            { id: 15, q: "مَنِ الصَّحابِيُّ الَّذِي قَالَ عَنْهُ عُمَرُ: 'أَبُو بَكْرٍ سَيِّدُنَا وَأَعْتَقَ سَيِّدَنَا'؟", options: ["بِلَالُ بْنُ رَبَاحٍ", "خَبَّابُ بْنُ الأَرَتِّ", "عَمَّارُ بْنُ يَاسِرٍ"], correct: 0 },
            { id: 16, q: "مَا هِيَ السُّورَةُ الَّتِي سُمِّيَتْ بـ 'المُقَشْقِشَةِ' لِأَنَّهَا تُبْرِئُ مِنَ الشِّرْكِ؟", options: ["سُورَةُ الكَافِرُونَ", "سُورَةُ الإِخْلَاصِ", "سُورَةُ النَّصْرِ"], correct: 0 },
            { id: 17, q: "مَنِ الصَّحابِيُّ الَّذِي كَانَ يَعْلَمُ 'أَسْمَاءَ المُنَافِقِينَ' وَأَسَرَّ إِلَيْهِ النَّبِيُّ ﷺ بِذَلِكَ؟", options: ["حُذَيْفَةُ بْنُ اليَمَانِ", "مُعَاذُ بْنُ جَبَلٍ", "أَبُو دُجَانَةَ"], correct: 0 },
            { id: 18, q: "مَنِ الصَّحابِيُّ الَّذِي لُقِّبَ بِـ 'غَسِيلِ المَلَائِكَةِ' يَوْمَ أُحُدٍ؟", options: ["حَنْظَلَةُ بْنُ أَبي عَامِرٍ", "جَعْفَرُ بْنُ أَبي طَالِبٍ", "سَعْدُ بْنُ الرَّبِيعِ"], correct: 0 },
            { id: 19, q: "مَن هوَ الصَّحابِيُّ الَّذِي دَعَا لَهُ النَّبِيُّ ﷺ: 'اللهُمَّ فَقِّهْهُ فِي الدِّينِ وَعَلِّمْهُ التَّأْوِيلَ'؟", options: ["عَبْدُ اللهِ بْنُ عَبَّاسٍ", "عَبْدُ اللهِ بْنُ مَسْعُودٍ", "أَنَسُ بْنُ مَالِكٍ"], correct: 0 },
            { id: 20, q: "مَنْ هُوَ أَوَّلُ مَنْ صَنَّفَ فِي 'الصَّحِيحِ' المُجَرَّدِ مِنْ أَئِمَّةِ الحَدِيثِ؟", options: ["الإِمَامُ البُخَارِيُّ", "الإِمَامُ مُسْلِمٌ", "الإِمَامُ مَالِكٌ"], correct: 0 }
        ];

        let currentQuestion;
        let timeLeft = 30;
        let timerId;
        let userResult = "";

        function initQuestion() {
            const todayDate = new Date().getDate(); 
            // المنطق البرمجي: اختيار السؤال بناءً على اليوم من المصفوفة المكونة من 20 سؤالاً
            const questionIndex = (todayDate - 1) % questionsDatabase.length; 
            currentQuestion = questionsDatabase[questionIndex];
        }

        function startQuiz() {
            if (localStorage.getItem('nafahat_quiz_id_' + currentQuestion.id)) {
                alert("لقد شاركت في تحدي اليوم بالفعل! ننتظرك غداً بإذن الله.");
                return;
            }

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('question-text').innerText = currentQuestion.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = ""; 
            
            currentQuestion.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx);
                grid.appendChild(btn);
            });

            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    selectOption(-1); 
                }
            }, 1000);
        }

        function selectOption(index) {
            clearInterval(timerId);
            localStorage.setItem('nafahat_quiz_id_' + currentQuestion.id, 'completed');
            
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('share-section').style.display = 'flex';

            if (index === currentQuestion.correct) {
                userResult = "WIN";
                document.getElementById('result-title').innerText = "أحسنت! إجابة صحيحة ✅";
                document.getElementById('result-title').style.color = "var(--primary-color)";
                document.getElementById('result-msg').innerText = `ما شاء الله! أجبت بدقة في ${30 - timeLeft} ثانية.`;
            } else {
                userResult = "LOSE";
                document.getElementById('result-title').innerText = "لم توفق هذه المرة 🌙";
                document.getElementById('result-title').style.color = "#c62828";
                document.getElementById('result-msg').innerText = index === -1 ? "للأسف، انتهى الوقت المخصص للإجابة!" : "حاول مجدداً في سؤال الغد لتثبيت معلومة جديدة.";
            }
        }

        function shareResult(platform) {
            let shareMsg = "";
            if (userResult === "WIN") {
                shareMsg = `🌙 خضت تحدي "نفحات" الرمضاني اليوم وأجبت بنجاح! ⚡\nهل تعتقد أنك أسرع مني في الإجابة؟ جرب الآن واحذر من التايمر! 👇\n${window.location.href}`;
            } else {
                shareMsg = `🌙 مسابقة "نفحات" الرمضانية.. معلومات قيمة وتحدي حقيقي للوقت! ⏳\nادخل الآن واختبر معلوماتك الدينية في سؤال اليوم 👇\n${window.location.href}`;
            }

            if (platform === 'whatsapp') {
                window.open(`https://wa.me/?text=${encodeURIComponent(shareMsg)}`);
            } else {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(shareMsg)}`);
            }
        }

        window.onload = initQuestion;
    </script>
</body>
</html>
